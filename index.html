// Дата окончания акции (Алматы, UTC+5)
const DEADLINE = new Date("2026-06-10T23:59:59+05:00");

function Countdown() {
  const calc = () => Math.max(0, Math.floor((DEADLINE - new Date()) / 1000));
  const [left, setLeft] = useState(calc());
  useEffect(() => {
    const t = setInterval(() => setLeft(calc()), 1000);
    return () => clearInterval(t);
  }, []);
  const d = Math.floor(left / 86400);
  const h = Math.floor((left % 86400) / 3600);
  const m = Math.floor((left % 3600) / 60);
  const s = left % 60;
  const Box = ({ v, label }) => (
    <div className="flex flex-col items-center">
      <div style={{fontFamily:"Oswald"}} className="flex h-14 w-14 items-center justify-center rounded-2xl bg-[#0f0d0c] text-2xl font-bold tabular-nums text-white">{String(v).padStart(2,"0")}</div>
      <span className="mt-1 text-[10px] font-semibold uppercase tracking-wide text-black/45">{label}</span>
    </div>
  );
  return (
    <div className="mt-6 rounded-3xl border border-[#c0341d]/20 bg-white p-5">
      <p className="text-center text-sm font-bold uppercase tracking-wide text-[#c0341d]">🔥 До конца акции — скидка 30%</p>
      {left > 0 ? (
        <div className="mt-4 flex items-center justify-center gap-2.5">
          <Box v={d} label="дней" /><span className="pb-4 text-2xl font-bold text-black/20">:</span>
          <Box v={h} label="часов" /><span className="pb-4 text-2xl font-bold text-black/20">:</span>
          <Box v={m} label="минут" /><span className="pb-4 text-2xl font-bold text-black/20">:</span>
          <Box v={s} label="секунд" />
        </div>
      ) : (
        <p className="mt-3 text-center text-base font-bold text-[#0f0d0c]">Срок акции истёк</p>
      )}
      <p className="mt-4 text-center text-xs text-black/55">После окончания срока условия будут изменены</p>
    </div>
  );
}

            {FORMATS.map(f=>{ const Icon=f.icon; return (
              <div key={f.id} className={"relative flex flex-col rounded-3xl border p-5 transition "+(f.featured?"border-[#c0341d] bg-[#0f0d0c] text-white shadow-xl md:scale-[1.03]":"border-black/10 bg-white")}>
                {f.featured && <span className="absolute -top-3 left-5 rounded-full bg-[#c0341d] px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-white">Популярный</span>}
                <div className="flex items-center gap-3">
                  <div className={"flex h-11 w-11 items-center justify-center rounded-xl "+(f.featured?"bg-[#c0341d]":"bg-[#c0341d]/10")}><Icon className={"h-5 w-5 "+(f.featured?"text-white":"text-[#c0341d]")} /></div>
                  <div><h3 style={{fontFamily:"Oswald"}} className="text-lg font-semibold uppercase leading-none">{f.name}</h3><p className={"mt-1 text-xs "+(f.featured?"text-white/55":"text-black/50")}>{f.tag}</p></div>
                </div>
                <div className="mt-4 flex items-end gap-2.5">
                  <span style={{fontFamily:"Oswald"}} className={"text-[26px] font-bold leading-none "+(f.featured?"text-white":"text-[#0f0d0c]")}>{fmt(f.newPrice)}</span>
                  <span className={"pb-0.5 text-sm line-through "+(f.featured?"text-white/40":"text-black/35")}>{fmt(f.oldPrice)}</span>
                  <span className={"mb-0.5 rounded-full px-2 py-0.5 text-[10px] font-bold "+(f.featured?"bg-white/15 text-[#e0563b]":"bg-[#c0341d] text-white")}>−{Math.round((1-f.newPrice/f.oldPrice)*100)}%</span>
                </div>
                <div className={"mt-3 inline-flex items-center gap-1.5 self-start rounded-lg px-2.5 py-1 text-[11px] font-bold "+(f.featured?"bg-white/10 text-[#e0563b]":"bg-[#c0341d]/10 text-[#c0341d]")}><Ico.Trend className="h-3.5 w-3.5" />{f.roi}</div>
                <ul className="mt-4 space-y-2">{f.points.map((p,i)=>(<li key={i} className="flex items-start gap-2 text-sm"><Ico.Check className={"mt-0.5 h-4 w-4 shrink-0 "+(f.featured?"text-[#e0563b]":"text-[#c0341d]")} /><span className={f.featured?"text-white/85":"text-black/70"}>{p}</span></li>))}</ul>
                <button onClick={()=>goToForm(f.id==="online"?"онлайн":"оффлайн")} className={"mt-auto w-full rounded-xl px-4 py-3 text-sm font-bold transition active:scale-[0.98] "+(f.featured?"bg-[#c0341d] text-white hover:bg-[#d13d24]":"bg-[#0f0d0c] text-white hover:bg-[#241d1b]")}>Выбрать формат</button>
              </div>
            );})}
          </div>
          <div className="mt-8 grid grid-cols-3 gap-3">
            {[{i:Ico.Head,t:"Личный куратор"},{i:Ico.Shield,t:"Тех. поддержка"},{i:Ico.Trend,t:"Реальный доход"}].map((b,i)=>{const I=b.i;return(
              <div key={i} className="rounded-2xl border border-black/10 bg-white p-3 text-center"><I className="mx-auto h-5 w-5 text-[#c0341d]" /><p className="mt-2 text-[11px] font-semibold leading-tight text-black/70">{b.t}</p></div>);})}
          </div>
        </div>
      </section>

      {/* МОДЕЛИ */}
      <section className="bg-[#0f0d0c] py-14">
        <div className="mx-auto max-w-md px-6">
          <p className="text-xs font-bold uppercase tracking-[0.25em] text-[#e0563b]">Что вы научитесь прошивать</p>
          <h2 style={{fontFamily:"Oswald"}} className="mt-2 text-3xl font-bold uppercase leading-tight">{TOTAL_MODELS}+ моделей авто</h2>
          <p className="mt-3 text-sm text-white/55">Перечень моделей зависит от выбранного формата. Нажмите на бренд, чтобы посмотреть.</p>
          <div className="mt-6 space-y-2.5">
            {MODELS.map(b=>{const isOpen=openBrand===b.brand;return(
              <div key={b.brand} className="overflow-hidden rounded-2xl border border-white/10 bg-white/[0.03]">
                <button onClick={()=>setOpenBrand(isOpen?null:b.brand)} className="flex w-full items-center justify-between px-4 py-3.5 text-left">
                  <span className="text-sm font-semibold text-white/90">{b.brand}</span>
                  <div className="flex items-center gap-2"><span className="rounded-full bg-[#c0341d]/20 px-2 py-0.5 text-[11px] font-semibold text-[#e0563b]">{b.items.length}</span><Ico.Chevron className={"h-4 w-4 text-white/50 transition "+(isOpen?"rotate-180":"")} /></div>
                </button>
                {isOpen && <div className="border-t border-white/10 px-4 py-3"><div className="flex flex-wrap gap-2">{b.items.map(m=>(<span key={m} className="rounded-lg bg-white/5 px-2.5 py-1 text-xs text-white/70">{m}</span>))}</div></div>}
              </div>);})}
          </div>
        </div>
      </section>

      {/* ПОЧЕМУ СЕЙЧАС + СТАТЫ */}
      <section className="bg-[#f6f1ee] py-14 text-[#0f0d0c]">
        <div className="mx-auto max-w-5xl px-6">
          <p className="text-xs font-bold uppercase tracking-[0.25em] text-[#c0341d]">Спрос растёт</p>
          <h2 style={{fontFamily:"Oswald"}} className="mt-2 text-3xl font-bold uppercase leading-tight">Почему русификацией выгодно заниматься прямо сейчас</h2>
          <div className="mt-7 grid grid-cols-1 gap-3 md:grid-cols-2">
            {WHY.map((w,i)=>(
              <div key={i} className="flex items-start gap-3 rounded-2xl border border-black/10 bg-white p-4">
                <div className="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg bg-[#c0341d] text-xs font-bold text-white">{i+1}</div>
                <p className="text-sm leading-relaxed text-black/75">{w}</p>
              </div>
            ))}
          </div>
          <div className="mt-8 grid grid-cols-2 gap-3 md:grid-cols-4">
            {STATS.map((s,i)=>(
              <div key={i} className="rounded-2xl border border-black/10 bg-[#0f0d0c] p-5 text-center text-white">
                <div style={{fontFamily:"Oswald"}} className="text-3xl font-bold text-[#e0563b]">{s.value}</div>
                <p className="mt-1 text-[11px] leading-tight text-white/60">{s.label}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ОТЗЫВЫ */}
      <section className="bg-[#0f0d0c] py-14">
        <div className="mx-auto max-w-5xl px-6">
          <div className="flex items-center gap-2">
            <div className="flex gap-0.5">{[0,1,2,3,4].map(i=>(<Ico.Star key={i} className="h-4 w-4 text-amber-400" />))}</div>
            <span className="text-xs font-semibold text-white/60">Нам доверяют ученики по всему Казахстану</span>
          </div>
          <h2 style={{fontFamily:"Oswald"}} className="mt-3 text-3xl font-bold uppercase leading-tight">Отзывы наших учеников</h2>
          <div className="mt-7 grid grid-cols-1 gap-4 md:grid-cols-3">
            {REVIEWS.map((r,i)=>(
              <div key={i} className="flex flex-col rounded-3xl border border-white/10 bg-white/[0.03] p-6">
                <div className="flex gap-0.5">{[0,1,2,3,4].map(j=>(<Ico.Star key={j} className="h-4 w-4 text-amber-400" />))}</div>
                <p className="mt-4 flex-1 text-sm leading-relaxed text-white/80">«{r.text}»</p>
                <div className="mt-5 flex items-center gap-3">
                  <div className="flex h-10 w-10 items-center justify-center rounded-full bg-[#c0341d] text-sm font-bold text-white">{r.initial}</div>
                  <div><div className="text-sm font-semibold text-white">{r.name}</div><div className="text-xs text-white/45">{r.role}</div></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FAQ */}
      <section className="bg-[#f6f1ee] py-14 text-[#0f0d0c]">
        <div className="mx-auto max-w-3xl px-6">
          <p className="text-xs font-bold uppercase tracking-[0.25em] text-[#c0341d]">Частые вопросы</p>
          <h2 style={{fontFamily:"Oswald"}} className="mt-3 text-3xl font-bold uppercase leading-tight">Отвечаем на главные сомнения</h2>
          <div className="mt-7 space-y-3">
            {[
              {q:"А если я не технарь?",a:"Получится. Курс рассчитан на новичков с нуля — всё по шагам, с инструкциями и куратором. Не нужно быть программистом: ты просто повторяешь проверенную последовательность действий."},
              {q:"Какое оборудование нужно?",a:"Только ноутбук на Windows. Мощный не обязателен — подойдёт любой рабочий ноутбук. Никакого дорогого оборудования покупать не нужно."},
              {q:"А есть ли вообще спрос?",a:"Спрос огромный и продолжает расти. Китайских машин на дорогах всё больше: только за 2025 год в Казахстане продано около 85 000 новых китайских авто — это почти 40% рынка. Почти у всех мультимедиа на китайском, а специалистов по русификации не хватает. Клиенты ищут таких мастеров сами."},
            ].map((f,i)=>(
              <div key={i} className="rounded-2xl border border-black/10 bg-white p-5">
                <h3 className="text-base font-bold text-[#0f0d0c]">{f.q}</h3>
                <p className="mt-2 text-sm leading-relaxed text-black/65">{f.a}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FLOW */}
      <section id="flow" className="bg-[#f6f1ee] py-14 text-[#0f0d0c]">
        <div className="mx-auto max-w-md px-6">
          {stage!=="done" && (
            <div className="rounded-3xl border border-black/10 bg-white p-7">
              <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-[#c0341d]/10"><Ico.Check className="h-6 w-6 text-[#c0341d]" /></div>
              <h2 style={{fontFamily:"Oswald"}} className="mt-4 text-2xl font-bold uppercase leading-tight">Оставь заявку — мы свяжемся с тобой</h2>
              <p className="mt-2 text-sm text-black/60">Подскажем по программе, ценам и поможем выбрать формат.</p>
              <div className="mt-6 space-y-4">
                <div><label className="text-xs font-semibold text-black/50">Имя</label><div className="mt-1.5 flex items-center gap-2 rounded-2xl border border-black/10 bg-[#f6f1ee] px-4 py-3 focus-within:border-[#c0341d]"><Ico.User className="h-4 w-4 text-black/40" /><input value={name} onChange={e=>setName(e.target.value)} placeholder="Например, Бека" className="w-full bg-transparent text-sm outline-none placeholder:text-black/30" /></div></div>
                <div><label className="text-xs font-semibold text-black/50">Телефон</label><div className="mt-1.5 flex items-center gap-2 rounded-2xl border border-black/10 bg-[#f6f1ee] px-4 py-3 focus-within:border-[#c0341d]"><Ico.Phone className="h-4 w-4 text-black/40" /><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+7 ___ ___ __ __" inputMode="tel" className="w-full bg-transparent text-sm outline-none placeholder:text-black/30" /></div></div>
                <div><label className="text-xs font-semibold text-black/50">Формат обучения</label>
                  <div className="mt-1.5 grid grid-cols-2 gap-2">
                    {["онлайн","оффлайн"].map(o=>(
                      <button key={o} onClick={()=>setFormat(o)} className={"rounded-2xl border px-4 py-3 text-sm font-medium capitalize transition active:scale-[0.99] "+(format===o?"border-[#c0341d] bg-[#c0341d] text-white":"border-black/10 bg-[#f6f1ee] hover:border-[#c0341d]/40")}>{o}</button>
                    ))}
                  </div>
                </div>
                <div><label className="text-xs font-semibold text-black/50">Когда планируете начать</label>
                  <div className="mt-1.5 grid grid-cols-2 gap-2">
                    {["сегодня","завтра"].map(o=>(
                      <button key={o} onClick={()=>setStart(o)} className={"rounded-2xl border px-2 py-3 text-sm font-medium capitalize transition active:scale-[0.99] "+(start===o?"border-[#c0341d] bg-[#c0341d] text-white":"border-black/10 bg-[#f6f1ee] hover:border-[#c0341d]/40")}>{o}</button>
                    ))}
                  </div>
                </div>
              </div>
              <button onClick={submit} disabled={!name.trim()||!phone.trim()||!format||!start||sending} className="mt-6 flex w-full items-center justify-center gap-2 rounded-2xl bg-[#c0341d] px-6 py-4 text-base font-bold text-white transition active:scale-[0.98] hover:bg-[#d13d24] disabled:cursor-not-allowed disabled:opacity-40"><Ico.Phone className="h-5 w-5" />{sending?"Отправляем…":"Получить консультацию"}</button>
              <p className="mt-3 text-center text-[11px] text-black/40">Нажимая кнопку, вы перейдёте в WhatsApp с готовым сообщением.</p>
            </div>
          )}
          {stage==="done" && (
            <div className="rounded-3xl border border-[#c0341d]/30 bg-white p-8 text-center">
              <div className="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-[#c0341d]/10"><Ico.Check className="h-8 w-8 text-[#c0341d]" /></div>
              <h2 style={{fontFamily:"Oswald"}} className="mt-4 text-2xl font-bold uppercase">Заявка отправлена!</h2>
              <p className="mt-2 text-sm text-black/60">Если WhatsApp не открылся автоматически — нажмите кнопку ниже.</p>
              <a href={"https://wa.me/"+WHATSAPP_NUMBER+"?text="+buildMessage()} target="_blank" rel="noreferrer" className="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-[#c0341d] px-6 py-4 text-base font-bold text-white transition active:scale-[0.98] hover:bg-[#d13d24]">Открыть WhatsApp</a>
            </div>
          )}
        </div>
      </section>

      <footer className="bg-[#0f0d0c] py-8 text-center">
        <img src={LOGO} alt="Russification.auto" className="mx-auto h-10 w-auto opacity-90" />
        <p className="mt-2 text-xs text-white/40">Перевод мультимедиа и систем авто с китайского на русский · Алматы</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

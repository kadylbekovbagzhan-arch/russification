  { brand:"BYD", items:["Destroyer","Seal 05","Qin Plus (чипсет 26)","Qin L (чипсет 18)"] },
  { brand:"Hyundai", items:["Tucson","Sonata","Elantra","Grandeur","Santa Fe","Palisade"] },
  { brand:"Kia", items:["K3","K5","K7","K8","Seltos","Sportage","Sorento","Carnival"] },
  { brand:"Chevrolet", items:["Monza"] },
];
const TOTAL_MODELS = MODELS.reduce((s,b)=>s+b.items.length,0);

const STATS = [
  { value:"2 года", label:"на рынке русификации" },
  { value:"500+", label:"успешных русификаций" }, // <- поставьте своё число
  { value:TOTAL_MODELS+"+", label:"моделей авто" },
  { value:"100%", label:"сопровождение учеников" },
];
const WHY = [
  "Тысячи новых китайских авто в Казахстане — у большинства интерфейс на китайском",
  "Владельцы готовы платить за перевод системы на русский язык",
  "Специалистов мало — конкуренция низкая, а заказы идут постоянно",
  "Можно начать из дома: без аренды, склада и дорогого оборудования",
];
// ЗАМЕНИТЕ на реальные отзывы!
const REVIEWS = [
  { initial:"А", name:"Арман", role:"Выпускник онлайн-курса, Астана", text:"Прошёл онлайн с нуля, через неделю взял первый заказ на русификацию. Курс окупился буквально за пару клиентов." },
  { initial:"Д", name:"Данияр", role:"Владелец автосервиса, Шымкент", text:"Добавил русификацию как услугу в сервис — пошёл новый поток клиентов. Кураторы помогали, пока не освоился." },
  { initial:"Е", name:"Ержан", role:"Доп. заработок, Алматы", text:"Делаю русификации по вечерам после основной работы. Спрос реально большой, заказы находятся сами." },
];

const QUESTIONS = [
  { id:"age", q:"Сколько вам лет?", options:["До 18","18–25","26–35","36–45","45+"] },
  { id:"goal", q:"Какая у вас цель обучения?", options:["Новая профессия с нуля","Дополнительный заработок","Расширить услуги своего автосервиса","Прошить свой автомобиль"] },
  { id:"level", q:"Какой у вас текущий уровень?", options:["Новичок, без опыта","Немного разбираюсь в Android/ADB","Есть опыт в автоэлектронике","Уже прошиваю, хочу прокачаться"] },
  { id:"format", q:"В каком формате удобнее заниматься?", options:["Онлайн","Оффлайн — в группе (Алматы)","Оффлайн — индивидуально (Алматы)","Пока не определился"] },
  { id:"calltime", q:"Когда удобно получить звонок?", options:["Сегодня","Завтра","В течение недели","В любое время"] },
];

function App() {
  const [stage, setStage] = useState("landing");
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [openBrand, setOpenBrand] = useState(null);
  const [sending, setSending] = useState(false);

  const startQuiz = () => {
    setStage("quiz"); setStep(0);
    setTimeout(()=>document.getElementById("flow")?.scrollIntoView({behavior:"smooth",block:"start"}),50);
  };
  const pick = (qid,v) => {
    setAnswers(a=>({...a,[qid]:v}));
    setTimeout(()=>{ if(step<QUESTIONS.length-1) setStep(s=>s+1); else setStage("contact"); },220);
  };
  const buildMessage = () => encodeURIComponent([
    "Здравствуйте! Хочу заказать звонок по курсу Russification.auto 🚗","",
    "👤 Имя: "+name, "📞 Телефон: "+phone, "",
    "📋 Мои ответы из опроса:",
    "• Возраст: "+(answers.age||"—"),
    "• Цель обучения: "+(answers.goal||"—"),
    "• Текущий уровень: "+(answers.level||"—"),
    "• Удобный формат: "+(answers.format||"—"),
    "• Время для звонка: "+(answers.calltime||"—"),
  ].join("\n"));

  const sendToSheet = async () => {
    if(!SHEET_ENDPOINT) return;
    try{
      await fetch(SHEET_ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({date:new Date().toLocaleString("ru-RU"),name,phone,age:answers.age||"",goal:answers.goal||"",level:answers.level||"",format:answers.format||"",calltime:answers.calltime||""})});
    }catch(e){}
  };
  const submit = async () => {
    if(!name.trim()||!phone.trim()) return;
    setSending(true);
    await sendToSheet();
    window.open("https://wa.me/"+WHATSAPP_NUMBER+"?text="+buildMessage(),"_blank");
    setSending(false); setStage("done");
  };

  return (
    <div className="min-h-screen w-full bg-[#0f0d0c] text-white">
      {/* HERO */}
      <section className="relative overflow-hidden">
        <div className="pointer-events-none absolute inset-0">
          <div className="absolute -top-24 -right-24 h-80 w-80 rounded-full bg-[#c0341d] opacity-30 blur-[100px]"></div>
          <div className="absolute top-40 -left-20 h-72 w-72 rounded-full bg-[#c0341d] opacity-20 blur-[120px]"></div>
        </div>
        <div className="relative mx-auto max-w-md px-6 pt-10 pb-14">
          <div className="flex items-center gap-2.5">
            <img src={LOGO} alt="Russification.auto" className="h-12 w-auto" />
          </div>
          <div className="mt-10 inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-xs text-white/70"><span className="h-1.5 w-1.5 rounded-full bg-[#e0563b]"></span>Обучаем русификации авто 🇨🇳 → 🇷🇺</div>
          <h1 style={{fontFamily:"Oswald"}} className="mt-5 text-[40px] font-bold leading-[1.05] uppercase tracking-tight">Подберём <span className="text-[#e0563b]">формат обучения</span> под вашу цель</h1>
          <p className="mt-4 text-[15px] leading-relaxed text-white/70">Ответьте на пару вопросов, и мы предложим подходящий формат курса — от онлайна до индивидуальной практики.</p>
          <button onClick={startQuiz} className="group mt-7 flex w-full items-center justify-center gap-2 rounded-2xl bg-[#c0341d] px-6 py-4 text-base font-bold text-white shadow-lg shadow-[#c0341d]/30 transition active:scale-[0.98] hover:bg-[#d13d24]">Пройти короткий опрос<Ico.ArrowRight className="h-5 w-5" /></button>
          <div className="mt-6 flex items-center justify-center gap-5 text-[11px] text-white/45"><span>~ 1 минута</span><span className="h-3 w-px bg-white/15"></span><span>{TOTAL_MODELS}+ моделей авто</span><span className="h-3 w-px bg-white/15"></span><span>Скидка 30%</span></div>
        </div>
      </section>

      {/* ФОРМАТЫ */}
      <section className="bg-[#f6f1ee] py-14 text-[#0f0d0c]">
        <div className="mx-auto max-w-5xl px-6">
          <p className="text-xs font-bold uppercase tracking-[0.25em] text-[#c0341d]">Форматы курсов</p>
          <h2 style={{fontFamily:"Oswald"}} className="mt-2 text-3xl font-bold uppercase leading-tight">Выберите, как удобно учиться</h2>
          <div className="mt-2 inline-flex items-center gap-1.5 rounded-full bg-[#c0341d]/10 px-3 py-1 text-xs font-semibold text-[#c0341d]">🔥 Действует скидка 30%</div>
          <p className="mt-3 text-sm text-black/60">Оффлайн-форматы (групповой и индивидуальный) проходят очно <span className="font-semibold text-[#c0341d]">в Алматы</span>. Онлайн-курс доступен из любой точки.</p>
          <div className="mt-7 grid grid-cols-1 gap-4 md:grid-cols-3 md:items-stretch">
            {FORMATS.map(f=>{ const Icon=f.icon; return (
              <div key={f.id} className={"relative flex flex-col rounded-3xl border p-5 transition "+(f.featured?"border-[#c0341d] bg-[#0f0d0c] text-white shadow-xl md:scale-[1.03]":"border-black/10 bg-white")}>
                {f.featured && <span className="absolute -top-3 left-5 rounded-full bg-[#c0341d] px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-white">Популярный</span>}
                <div className="flex items-center gap-3">
                  <div className={"flex h-11 w-11 items-center justify-center rounded-xl "+(f.featured?"bg-[#c0341d]":"bg-[#c0341d]/10")}><Icon className={"h-5 w-5 "+(f.featured?"text-white":"text-[#c0341d]")} /></div>
                  <div><h3 style={{fontFamily:"Oswald"}} className="text-lg font-semibold uppercase leading-none">{f.name}</h3><p className={"mt-1 text-xs "+(f.featured?"text-white/55":"text-black/50")}>{f.tag}</p></div>
                </div>
                <div className="mt-4 flex items-end gap-2.5">
                  <span style={{fontFamily:"Oswald"}} className={"text-[26px] font-bold leading-none "+(f.featured?"text-white":"text-[#0f0d0c]")}>{fmt(f.newPrice)}</span>
                  <span className={"pb-0.5 text-sm line-through "+(f.featured?"text-white/40":"text-black/35")}>{fmt(f.oldPrice)}</span>
                  <span className={"mb-0.5 rounded-full px-2 py-0.5 text-[10px] font-bold "+(f.featured?"bg-white/15 text-[#e0563b]":"bg-[#c0341d] text-white")}>−30%</span>
                </div>
                <ul className="mt-4 space-y-2">{f.points.map((p,i)=>(<li key={i} className="flex items-start gap-2 text-sm"><Ico.Check className={"mt-0.5 h-4 w-4 shrink-0 "+(f.featured?"text-[#e0563b]":"text-[#c0341d]")} /><span className={f.featured?"text-white/85":"text-black/70"}>{p}</span></li>))}</ul>
                <button onClick={startQuiz} className={"mt-auto w-full rounded-xl px-4 py-3 text-sm font-bold transition active:scale-[0.98] "+(f.featured?"bg-[#c0341d] text-white hover:bg-[#d13d24]":"bg-[#0f0d0c] text-white hover:bg-[#241d1b]")}>Выбрать формат</button>
              </div>
            );})}
          </div>
          <div className="mt-8 grid grid-cols-3 gap-3">
            {[{i:Ico.Head,t:"Личный куратор"},{i:Ico.Shield,t:"Тех. поддержка"},{i:Ico.Trend,t:"Реальный доход"}].map((b,i)=>{const I=b.i;return(
              <div key={i} className="rounded-2xl border border-black/10 bg-white p-3 text-center"><I className="mx-auto h-5 w-5 text-[#c0341d]" /><p className="mt-2 text-[11px] font-semibold leading-tight text-black/70">{b.t}</p></div>);})}
          </div>
        </div>
      </section>

      {/* МОДЕЛИ */}
      <section className="bg-[#0f0d0c] py-14">
        <div className="mx-auto max-w-md px-6">
          <p className="text-xs font-bold uppercase tracking-[0.25em] text-[#e0563b]">Что вы научитесь прошивать</p>
          <h2 style={{fontFamily:"Oswald"}} className="mt-2 text-3xl font-bold uppercase leading-tight">{TOTAL_MODELS}+ моделей авто</h2>
          <p className="mt-3 text-sm text-white/55">Перечень моделей зависит от выбранного формата. Нажмите на бренд, чтобы посмотреть.</p>
          <div className="mt-6 space-y-2.5">
            {MODELS.map(b=>{const isOpen=openBrand===b.brand;return(
              <div key={b.brand} className="overflow-hidden rounded-2xl border border-white/10 bg-white/[0.03]">
                <button onClick={()=>setOpenBrand(isOpen?null:b.brand)} className="flex w-full items-center justify-between px-4 py-3.5 text-left">
                  <span className="text-sm font-semibold text-white/90">{b.brand}</span>
                  <div className="flex items-center gap-2"><span className="rounded-full bg-[#c0341d]/20 px-2 py-0.5 text-[11px] font-semibold text-[#e0563b]">{b.items.length}</span><Ico.Chevron className={"h-4 w-4 text-white/50 transition "+(isOpen?"rotate-180":"")} /></div>
                </button>
                {isOpen && <div className="border-t border-white/10 px-4 py-3"><div className="flex flex-wrap gap-2">{b.items.map(m=>(<span key={m} className="rounded-lg bg-white/5 px-2.5 py-1 text-xs text-white/70">{m}</span>))}</div></div>}
              </div>);})}
          </div>
        </div>
      </section>

      {/* ПОЧЕМУ СЕЙЧАС + СТАТЫ */}
      <section className="bg-[#f6f1ee] py-14 text-[#0f0d0c]">
        <div className="mx-auto max-w-5xl px-6">
          <p className="text-xs font-bold uppercase tracking-[0.25em] text-[#c0341d]">Спрос растёт</p>
          <h2 style={{fontFamily:"Oswald"}} className="mt-2 text-3xl font-bold uppercase leading-tight">Почему русификацией выгодно заниматься прямо сейчас</h2>
          <div className="mt-7 grid grid-cols-1 gap-3 md:grid-cols-2">
            {WHY.map((w,i)=>(
              <div key={i} className="flex items-start gap-3 rounded-2xl border border-black/10 bg-white p-4">
                <div className="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg bg-[#c0341d] text-xs font-bold text-white">{i+1}</div>
                <p className="text-sm leading-relaxed text-black/75">{w}</p>
              </div>
            ))}
          </div>
          <div className="mt-8 grid grid-cols-2 gap-3 md:grid-cols-4">
            {STATS.map((s,i)=>(
              <div key={i} className="rounded-2xl border border-black/10 bg-[#0f0d0c] p-5 text-center text-white">
                <div style={{fontFamily:"Oswald"}} className="text-3xl font-bold text-[#e0563b]">{s.value}</div>
                <p className="mt-1 text-[11px] leading-tight text-white/60">{s.label}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ОТЗЫВЫ */}
      <section className="bg-[#0f0d0c] py-14">
        <div className="mx-auto max-w-5xl px-6">
          <div className="flex items-center gap-2">
            <div className="flex gap-0.5">{[0,1,2,3,4].map(i=>(<Ico.Star key={i} className="h-4 w-4 text-amber-400" />))}</div>
            <span className="text-xs font-semibold text-white/60">Нам доверяют ученики по всему Казахстану</span>
          </div>
          <h2 style={{fontFamily:"Oswald"}} className="mt-3 text-3xl font-bold uppercase leading-tight">Отзывы наших учеников</h2>
          <div className="mt-7 grid grid-cols-1 gap-4 md:grid-cols-3">
            {REVIEWS.map((r,i)=>(
              <div key={i} className="flex flex-col rounded-3xl border border-white/10 bg-white/[0.03] p-6">
                <div className="flex gap-0.5">{[0,1,2,3,4].map(j=>(<Ico.Star key={j} className="h-4 w-4 text-amber-400" />))}</div>
                <p className="mt-4 flex-1 text-sm leading-relaxed text-white/80">«{r.text}»</p>
                <div className="mt-5 flex items-center gap-3">
                  <div className="flex h-10 w-10 items-center justify-center rounded-full bg-[#c0341d] text-sm font-bold text-white">{r.initial}</div>
                  <div><div className="text-sm font-semibold text-white">{r.name}</div><div className="text-xs text-white/45">{r.role}</div></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FLOW */}
      <section id="flow" className="bg-[#f6f1ee] py-14 text-[#0f0d0c]">
        <div className="mx-auto max-w-md px-6">
          {stage==="landing" && (
            <div className="rounded-3xl border border-black/10 bg-white p-8 text-center">
              <h2 style={{fontFamily:"Oswald"}} className="text-2xl font-bold uppercase leading-tight">Готовы подобрать формат?</h2>
              <p className="mt-3 text-sm text-black/60">5 коротких вопросов — и мы поймём, что подойдёт именно вам.</p>
              <button onClick={startQuiz} className="mt-6 flex w-full items-center justify-center gap-2 rounded-2xl bg-[#c0341d] px-6 py-4 text-base font-bold text-white transition active:scale-[0.98] hover:bg-[#d13d24]">Пройти короткий опрос<Ico.ArrowRight className="h-5 w-5" /></button>
            </div>
          )}
          {stage==="quiz" && (
            <div className="rounded-3xl border border-black/10 bg-white p-6">
              <div className="flex items-center justify-between text-xs font-semibold text-black/40"><span>Вопрос {step+1} из {QUESTIONS.length}</span><span>{Math.round(((step+1)/QUESTIONS.length)*100)}%</span></div>
              <div className="mt-2 h-1.5 w-full overflow-hidden rounded-full bg-black/10"><div className="h-full rounded-full bg-[#c0341d] transition-all duration-300" style={{width:(((step+1)/QUESTIONS.length)*100)+"%"}}></div></div>
              <h2 style={{fontFamily:"Oswald"}} className="mt-6 text-2xl font-bold uppercase leading-tight">{QUESTIONS[step].q}</h2>
              <div className="mt-5 space-y-3">
                {QUESTIONS[step].options.map(opt=>{const active=answers[QUESTIONS[step].id]===opt;return(
                  <button key={opt} onClick={()=>pick(QUESTIONS[step].id,opt)} className={"flex w-full items-center justify-between rounded-2xl border px-4 py-3.5 text-left text-sm font-medium transition active:scale-[0.99] "+(active?"border-[#c0341d] bg-[#c0341d] text-white":"border-black/10 bg-white hover:border-[#c0341d]/40 hover:bg-[#c0341d]/5")}>{opt}<Ico.ArrowRight className={"h-4 w-4 "+(active?"text-white":"text-black/25")} /></button>);})}
              </div>
              {step>0 && <button onClick={()=>setStep(s=>s-1)} className="mt-5 text-xs font-semibold text-black/40 hover:text-black/70">← Назад</button>}
            </div>
          )}
          {stage==="contact" && (
            <div className="rounded-3xl border border-black/10 bg-white p-7">
              <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-[#c0341d]/10"><Ico.Check className="h-6 w-6 text-[#c0341d]" /></div>
              <h2 style={{fontFamily:"Oswald"}} className="mt-4 text-2xl font-bold uppercase leading-tight">Спасибо! Оставьте заявку</h2>
              <p className="mt-2 text-sm text-black/60">Мы свяжемся с вами и предложим подходящий формат курса.</p>
              <div className="mt-6 space-y-4">
                <div><label className="text-xs font-semibold text-black/50">Ваше имя</label><div className="mt-1.5 flex items-center gap-2 rounded-2xl border border-black/10 bg-[#f6f1ee] px-4 py-3 focus-within:border-[#c0341d]"><Ico.User className="h-4 w-4 text-black/40" /><input value={name} onChange={e=>setName(e.target.value)} placeholder="Например, Багжан" className="w-full bg-transparent text-sm outline-none placeholder:text-black/30" /></div></div>
                <div><label className="text-xs font-semibold text-black/50">Номер телефона</label><div className="mt-1.5 flex items-center gap-2 rounded-2xl border border-black/10 bg-[#f6f1ee] px-4 py-3 focus-within:border-[#c0341d]"><Ico.Phone className="h-4 w-4 text-black/40" /><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+7 ___ ___ __ __" inputMode="tel" className="w-full bg-transparent text-sm outline-none placeholder:text-black/30" /></div></div>
              </div>
              <button onClick={submit} disabled={!name.trim()||!phone.trim()||sending} className="mt-6 flex w-full items-center justify-center gap-2 rounded-2xl bg-[#c0341d] px-6 py-4 text-base font-bold text-white transition active:scale-[0.98] hover:bg-[#d13d24] disabled:cursor-not-allowed disabled:opacity-40"><Ico.Phone className="h-5 w-5" />{sending?"Отправляем…":"Заказать звонок"}</button>
              <p className="mt-3 text-center text-[11px] text-black/40">Нажимая кнопку, вы перейдёте в WhatsApp с готовым сообщением.</p>
            </div>
          )}
          {stage==="done" && (
            <div className="rounded-3xl border border-[#c0341d]/30 bg-white p-8 text-center">
              <div className="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-[#c0341d]/10"><Ico.Check className="h-8 w-8 text-[#c0341d]" /></div>
              <h2 style={{fontFamily:"Oswald"}} className="mt-4 text-2xl font-bold uppercase">Заявка отправлена!</h2>
              <p className="mt-2 text-sm text-black/60">Если WhatsApp не открылся автоматически — нажмите кнопку ниже.</p>
              <a href={"https://wa.me/"+WHATSAPP_NUMBER+"?text="+buildMessage()} target="_blank" rel="noreferrer" className="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-[#c0341d] px-6 py-4 text-base font-bold text-white transition active:scale-[0.98] hover:bg-[#d13d24]">Открыть WhatsApp</a>
            </div>
          )}
        </div>
      </section>

      <footer className="bg-[#0f0d0c] py-8 text-center">
        <img src={LOGO} alt="Russification.auto" className="mx-auto h-10 w-auto opacity-90" />
        <p className="mt-2 text-xs text-white/40">Перевод мультимедиа и систем авто с китайского на русский · Алматы</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
